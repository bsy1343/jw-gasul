# Deploy — main 브랜치 push 시 맥미니에 컨테이너 배포
name: Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_HOST: unix:///var/run/docker.sock
  PATH: /Users/bsy1343/.orbstack/bin:/usr/local/bin:/usr/bin:/bin
  DOCKER_CONFIG: /tmp/.docker-ci

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Disable Docker keychain
        run: mkdir -p "$DOCKER_CONFIG" && echo '{}' > "$DOCKER_CONFIG/config.json"

      - name: Build image
        run: docker build -t jw-gasul .

      - name: Deploy (recreate container)
        run: docker-compose -f /Users/bsy1343/dev/home-server/docker-compose.yml up -d --force-recreate jw-gasul

      - name: Prune dangling images
        run: docker image prune -f