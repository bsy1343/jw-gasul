# main push 시 테스트 + 배포, main으로의 PR은 테스트만
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_HOST: unix:///var/run/docker.sock
  IMAGE_NAME: jw-gasul

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PATH
        run: echo "/Users/bsy1343/.orbstack/bin" >> $GITHUB_PATH

      - name: Run tests
        run: docker build --target ci .

      - name: Build runtime image
        if: github.event_name == 'push'
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Deploy container
        if: github.event_name == 'push'
        run: docker compose -f /Users/bsy1343/dev/home-server/docker-compose.yml up -d --force-recreate --wait ${{ env.IMAGE_NAME }}

      - name: Show logs on failure
        if: failure()
        run: docker logs --tail 100 ${{ env.IMAGE_NAME }} || true

      - name: Prune dangling images
        if: always()
        run: docker image prune -f