<!-- layout.html — 공통 head/네비/플래시 프래그먼트. Tailwind 4 브라우저 CDN 사용(사내앱, 빌드 경량화). -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">재원가설 인원관리</title>
    <!-- 앱 아이콘: SVG 우선(고해상도), ico는 구형 브라우저 폴백, 180px는 iOS 홈 화면 추가용 -->
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}">
    <link rel="icon" sizes="32x32" th:href="@{/favicon.ico}">
    <link rel="apple-touch-icon" th:href="@{/images/icon-180.png}">
    <link rel="manifest" th:href="@{/images/site.webmanifest}">
    <!-- 모바일 주소창/상태바 색상을 네비 배경과 맞춘다 -->
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-title" content="재원가설">
    <!-- 메신저(카카오톡 등) 링크 미리보기 카드. 절대 URL이 필요해 baseUrl(BaseUrlAdvice)로 조립한다.
         제목/설명은 화면별 title이 아니라 고정 문구 — 채팅방에 '근로자 상세' 같은 내부 화면명을 흘리지 않기 위함. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="재원가설 인원관리">
    <meta property="og:title" content="재원가설 인원관리">
    <meta property="og:description" content="비계 시공 근로자 인적사항·현장 명부 관리">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:url" th:content="${baseUrl}">
    <meta property="og:image" th:content="${baseUrl} + '/images/og-image.png'">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <!-- 사내 전용 → 검색엔진 색인 금지(메신저 미리보기는 robots.txt를 안 두므로 정상 동작) -->
    <meta name="robots" content="noindex, nofollow">
    <!-- Tailwind 4 브라우저 CDN. Docker 빌드에서 CSS 컴파일/다운로드 없음 → 콜드 빌드 경량. -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
<!-- 상단 네비게이션 프래그먼트(인증 후 화면 공용). mobile-first: 상단행(로고+로그아웃) + 메뉴행(가로 스크롤) -->
<nav th:fragment="nav(active)" class="bg-slate-800 text-white sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-3 sm:px-4">
        <div class="h-14 flex items-center justify-between gap-3">
            <a th:href="@{/}" class="font-semibold tracking-tight truncate">재원가설 인원관리</a>
            <form th:action="@{/logout}" method="post" class="m-0 shrink-0">
                <button type="submit"
                        class="text-sm px-3 py-2 rounded-md bg-slate-700 hover:bg-slate-600 transition">로그아웃</button>
            </form>
        </div>
        <div class="flex items-center gap-1 text-sm overflow-x-auto pb-2">
            <a th:href="@{/}" th:classappend="${active == 'home'} ? 'bg-slate-700' : ''"
               class="shrink-0 px-3 py-1.5 rounded-md hover:bg-slate-700 transition">대시보드</a>
            <a th:href="@{/workers}" th:classappend="${active == 'workers'} ? 'bg-slate-700' : ''"
               class="shrink-0 px-3 py-1.5 rounded-md hover:bg-slate-700 transition">근로자</a>
            <a th:href="@{/sites}" th:classappend="${active == 'sites'} ? 'bg-slate-700' : ''"
               class="shrink-0 px-3 py-1.5 rounded-md hover:bg-slate-700 transition">현장</a>
            <a th:href="@{/roster}" th:classappend="${active == 'roster'} ? 'bg-slate-700' : ''"
               class="shrink-0 px-3 py-1.5 rounded-md hover:bg-slate-700 transition">명부</a>
            <a th:href="@{/audit}" th:classappend="${active == 'audit'} ? 'bg-slate-700' : ''"
               class="shrink-0 px-3 py-1.5 rounded-md hover:bg-slate-700 transition">감사 로그</a>
        </div>
    </div>
</nav>

<!-- 플래시 메시지 프래그먼트. message=완료(초록) / error=실패·차단(빨강) -->
<div th:fragment="flash" th:if="${message != null or error != null}"
     class="max-w-6xl mx-auto px-3 sm:px-4 mt-4 space-y-2">
    <div th:if="${message}" class="rounded-md bg-emerald-50 text-emerald-700 text-sm px-4 py-2.5 border border-emerald-200"
         th:text="${message}">완료</div>
    <div th:if="${error}" class="rounded-md bg-red-50 text-red-700 text-sm px-4 py-2.5 border border-red-200"
         th:text="${error}">오류</div>
</div>

<!-- 만료 상태 배지 프래그먼트(F-04): status=ExpiryStatus, dday=Long -->
<th:block th:fragment="expiryBadge(status, dday)" th:switch="${status?.name()}">
    <span th:case="'NONE'" class="text-slate-400">-</span>
    <span th:case="'UNREGISTERED'" class="text-xs px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">미등록</span>
    <span th:case="'EXPIRED'" class="text-xs px-1.5 py-0.5 rounded bg-red-50 text-red-600 font-medium">만료</span>
    <span th:case="'IMMINENT'" class="text-xs px-1.5 py-0.5 rounded bg-orange-50 text-orange-600 font-medium"
          th:text="'D-' + ${dday}">D-3</span>
    <span th:case="'NORMAL'" class="text-xs text-slate-500" th:text="${dday} + '일'">30일</span>
    <span th:case="*" class="text-slate-400">-</span>
</th:block>
</body>
</html>
