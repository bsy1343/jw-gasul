<!-- login.html — 로그인 화면(F-01). 실패/잠금/로그아웃 상태 메시지 분기 -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인 · 재원가설 인원관리')}"></head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
<div class="w-full max-w-sm">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <h1 class="text-xl font-semibold text-slate-800 text-center">재원가설 인원관리</h1>
        <p class="text-sm text-slate-500 text-center mt-1">로그인이 필요합니다</p>

        <!-- 상태 메시지 -->
        <div th:if="${param.error}" class="mt-4 text-sm rounded-md bg-red-50 text-red-700 px-3 py-2">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div th:if="${param.locked}" class="mt-4 text-sm rounded-md bg-amber-50 text-amber-700 px-3 py-2">
            로그인 실패가 많아 계정이 일시적으로 잠겼습니다. 잠시 후 다시 시도하세요.
        </div>
        <div th:if="${param.logout}" class="mt-4 text-sm rounded-md bg-slate-50 text-slate-600 px-3 py-2">
            로그아웃되었습니다.
        </div>

        <form th:action="@{/login}" method="post" class="mt-6 space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700">아이디</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username"
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700">비밀번호</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm
                              focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
            <button type="submit"
                    class="w-full rounded-md bg-slate-800 text-white text-sm font-medium py-2.5
                           hover:bg-slate-700 transition">로그인</button>
        </form>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">jw-gasul</p>
</div>
</body>
</html>
