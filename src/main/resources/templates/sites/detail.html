<!-- sites/detail.html — 현장 상세·수정(F-05): 수정 폼 + 종료/재개 + 삭제 + 명부 이력(Stage 6). mobile-first. -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('현장 상세 · 재원가설 인원관리')}"></head>
<body class="min-h-screen bg-slate-100">
<nav th:replace="~{fragments/layout :: nav('sites')}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="max-w-2xl mx-auto px-3 sm:px-4 py-5 sm:py-8">
    <div class="flex items-center gap-2 text-sm text-slate-500">
        <a th:href="@{/sites}" class="hover:text-slate-800">현장</a><span>/</span>
        <span class="text-slate-800" th:text="${site.name}">현장명</span>
    </div>
    <h1 class="mt-2 text-2xl font-semibold text-slate-800">
        <span th:text="${site.name}">현장명</span>
        <span th:if="${site.active}" class="text-xs align-middle px-2 py-0.5 rounded bg-green-50 text-green-600">진행</span>
        <span th:unless="${site.active}" class="text-xs align-middle px-2 py-0.5 rounded bg-slate-100 text-slate-500">종료</span>
    </h1>

    <!-- 수정 폼 -->
    <form th:action="@{/sites/{id}(id=${site.id})}" th:object="${siteForm}" method="post"
          class="mt-6 space-y-5 bg-white rounded-xl border border-slate-200 p-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1" for="name">현장명 <span class="text-red-500">*</span></label>
            <input type="text" id="name" th:field="*{name}"
                   class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-xs text-red-500"></p>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="clientName">발주처</label>
                <input type="text" id="clientName" th:field="*{clientName}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="address">주소</label>
                <input type="text" id="address" th:field="*{address}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="startDate">시작일</label>
                <input type="date" id="startDate" th:field="*{startDate}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="endDate">종료일</label>
                <input type="date" id="endDate" th:field="*{endDate}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
        </div>
        <div>
            <label class="flex items-center gap-2 text-sm text-slate-700"><input type="checkbox" th:field="*{active}"> 진행 중</label>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1" for="memo">비고</label>
            <textarea id="memo" th:field="*{memo}" rows="2"
                      class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"></textarea>
        </div>
        <div class="flex justify-end">
            <button type="submit" class="rounded-md bg-slate-800 text-white text-sm font-medium px-5 py-2 hover:bg-slate-700">수정 저장</button>
        </div>
    </form>

    <!-- 이 현장의 명부 이력(F-05) -->
    <section class="mt-6 bg-white rounded-xl border border-slate-200 p-4 sm:p-6">
        <h2 class="text-lg font-semibold text-slate-800">명부 이력</h2>
        <div class="mt-3 space-y-2">
            <a th:each="r : ${rosters}" th:href="@{/roster/{id}(id=${r.id})}"
               class="flex items-center justify-between gap-2 border border-slate-200 rounded-lg p-3 hover:bg-slate-50">
                <span class="min-w-0">
                    <span class="font-medium text-slate-800" th:text="${r.targetDate}">날짜</span>
                    <span class="text-xs px-1.5 py-0.5 rounded ml-1"
                          th:classappend="${r.type.name() == 'RANDOM'} ? 'bg-indigo-50 text-indigo-600' : 'bg-teal-50 text-teal-600'"
                          th:text="${r.type.name() == 'RANDOM'} ? '랜덤' : '선택'">유형</span>
                </span>
                <span class="shrink-0 text-slate-300">›</span>
            </a>
            <p th:if="${rosters.isEmpty()}" class="text-sm text-slate-400 py-2">이 현장으로 생성된 명부가 없습니다.</p>
        </div>
    </section>

    <!-- 상태 전환 / 삭제 -->
    <section class="mt-6 bg-white rounded-xl border border-slate-200 p-6 flex flex-wrap items-center gap-3">
        <form th:if="${site.active}" th:action="@{/sites/{id}/deactivate(id=${site.id})}" method="post" class="m-0">
            <button type="submit" class="rounded-md bg-slate-100 text-slate-700 text-sm px-4 py-2 hover:bg-slate-200">종료 처리</button>
        </form>
        <form th:unless="${site.active}" th:action="@{/sites/{id}/activate(id=${site.id})}" method="post" class="m-0">
            <button type="submit" class="rounded-md bg-green-50 text-green-700 text-sm px-4 py-2 hover:bg-green-100">다시 진행</button>
        </form>
        <form th:action="@{/sites/{id}/delete(id=${site.id})}" method="post" class="m-0 ml-auto"
              onsubmit="return confirm('이 현장을 삭제할까요?');">
            <button type="submit" class="rounded-md bg-red-50 text-red-600 text-sm px-4 py-2 hover:bg-red-100">삭제</button>
        </form>
    </section>
</main>
</body>
</html>
