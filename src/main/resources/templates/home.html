<!-- home.html — 대시보드(F-11): 요약 카드 + 주의 인원 + 최근 명부. mobile-first. -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('대시보드 · 재원가설 인원관리')}"></head>
<body class="min-h-screen bg-slate-100">
<nav th:replace="~{fragments/layout :: nav('home')}"></nav>

<main class="max-w-6xl mx-auto px-3 sm:px-4 py-5 sm:py-8">
    <h1 class="text-xl sm:text-2xl font-semibold text-slate-800">대시보드</h1>
    <p class="mt-1 text-sm text-slate-500"><span class="font-medium" th:text="${username}">사용자</span>님, 환영합니다.</p>

    <!-- 요약 카드 -->
    <div class="mt-4 grid grid-cols-2 sm:grid-cols-4 gap-3">
        <a th:href="@{/workers}" class="bg-white rounded-xl border border-slate-200 p-4 active:bg-slate-50">
            <div class="text-xs text-slate-500">총 인원</div>
            <div class="mt-1 text-2xl font-semibold text-slate-800" th:text="${dashboard.totalWorkers}">0</div>
            <div class="mt-0.5 text-xs text-slate-400">외국인 <span th:text="${dashboard.foreignCount}">0</span> · 한국인 <span th:text="${dashboard.koreanCount}">0</span></div>
        </a>
        <a th:href="@{/sites(active=true)}" class="bg-white rounded-xl border border-slate-200 p-4 active:bg-slate-50">
            <div class="text-xs text-slate-500">진행 중 현장</div>
            <div class="mt-1 text-2xl font-semibold text-slate-800" th:text="${dashboard.activeSiteCount}">0</div>
        </a>
        <a th:href="@{/workers(visa='EXPIRED')}" class="bg-white rounded-xl border border-slate-200 p-4 active:bg-slate-50">
            <div class="text-xs text-slate-500">비자 만료 / 임박</div>
            <div class="mt-1 text-2xl font-semibold text-red-600" th:text="${dashboard.expiry.visaExpired}">0</div>
            <div class="mt-0.5 text-xs text-orange-500">임박 <span th:text="${dashboard.expiry.visaImminent}">0</span></div>
        </a>
        <a th:href="@{/workers(edu='EXPIRED')}" class="bg-white rounded-xl border border-slate-200 p-4 active:bg-slate-50">
            <div class="text-xs text-slate-500">교육 만료 / 임박</div>
            <div class="mt-1 text-2xl font-semibold text-red-600" th:text="${dashboard.expiry.eduExpired}">0</div>
            <div class="mt-0.5 text-xs text-orange-500">임박 <span th:text="${dashboard.expiry.eduImminent}">0</span></div>
        </a>
        <a th:href="@{/workers(missingDoc=true)}" class="bg-white rounded-xl border border-slate-200 p-4 active:bg-slate-50">
            <div class="text-xs text-slate-500">서류 미비</div>
            <div class="mt-1 text-2xl font-semibold text-slate-800" th:text="${dashboard.missingDocCount}">0</div>
        </a>
        <a th:href="@{/workers(noAccount=true)}" class="bg-white rounded-xl border border-slate-200 p-4 active:bg-slate-50">
            <div class="text-xs text-slate-500">계좌 미등록</div>
            <div class="mt-1 text-2xl font-semibold text-slate-800" th:text="${dashboard.noAccountCount}">0</div>
        </a>
    </div>

    <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-4">
        <!-- 만료·임박 인원 -->
        <section class="bg-white rounded-xl border border-slate-200 p-4 sm:p-5">
            <h2 class="text-base font-semibold text-slate-800">만료·임박 인원</h2>
            <div class="mt-3 space-y-2">
                <a th:each="w : ${dashboard.attention}" th:href="@{/workers/{id}(id=${w.id})}"
                   class="flex items-center justify-between gap-2 border border-slate-100 rounded-lg p-2.5 hover:bg-slate-50">
                    <span class="min-w-0">
                        <span class="font-medium text-slate-800" th:text="${w.nameKo}">이름</span>
                        <span class="block text-xs text-slate-500">
                            비자 <span th:replace="~{fragments/layout :: expiryBadge(${w.visaStatus}, ${w.visaDday})}"></span>
                            · 교육 <span th:replace="~{fragments/layout :: expiryBadge(${w.eduStatus}, ${w.eduDday})}"></span>
                        </span>
                    </span>
                    <span class="shrink-0 text-slate-300">›</span>
                </a>
                <p th:if="${dashboard.attention.isEmpty()}" class="text-sm text-slate-400 py-2">만료·임박 인원이 없습니다.</p>
            </div>
        </section>

        <!-- 최근 명부 -->
        <section class="bg-white rounded-xl border border-slate-200 p-4 sm:p-5">
            <div class="flex items-center justify-between">
                <h2 class="text-base font-semibold text-slate-800">최근 명부</h2>
                <a th:href="@{/roster}" class="text-xs text-slate-500 hover:text-slate-800 underline">전체</a>
            </div>
            <div class="mt-3 space-y-2">
                <a th:each="r : ${dashboard.recentRosters}" th:href="@{/roster/{id}(id=${r.id})}"
                   class="flex items-center justify-between gap-2 border border-slate-100 rounded-lg p-2.5 hover:bg-slate-50">
                    <span class="min-w-0">
                        <span class="font-medium text-slate-800 truncate" th:text="${r.title}">현장</span>
                        <span class="block text-xs text-slate-500"><span th:text="${r.targetDate}">날짜</span>
                            · <span th:text="${r.type.name() == 'RANDOM'} ? '랜덤' : '선택'">유형</span></span>
                    </span>
                    <span class="shrink-0 text-slate-300">›</span>
                </a>
                <p th:if="${dashboard.recentRosters.isEmpty()}" class="text-sm text-slate-400 py-2">생성된 명부가 없습니다.</p>
            </div>
        </section>
    </div>
</main>
</body>
</html>
