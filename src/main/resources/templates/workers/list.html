<!-- workers/list.html — 근로자 목록(F-03): 전체/외국인/한국인 탭 + 검색 + 페이징 -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('근로자 · 재원가설 인원관리')}"></head>
<body class="min-h-screen bg-slate-100">
<nav th:replace="~{fragments/layout :: nav('workers')}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-slate-800">근로자</h1>
        <a th:href="@{/workers/new}"
           class="rounded-md bg-slate-800 text-white text-sm font-medium px-4 py-2 hover:bg-slate-700 transition">
            + 근로자 등록
        </a>
    </div>

    <!-- 유형 탭 -->
    <div class="mt-6 flex items-center gap-1 border-b border-slate-200">
        <a th:href="@{/workers(q=${q})}"
           th:classappend="${type == null} ? 'border-slate-800 text-slate-800 font-medium' : 'border-transparent text-slate-500'"
           class="px-4 py-2 border-b-2 -mb-px text-sm hover:text-slate-800">전체</a>
        <a th:href="@{/workers(type='FOREIGN', q=${q})}"
           th:classappend="${type != null and type.name() == 'FOREIGN'} ? 'border-slate-800 text-slate-800 font-medium' : 'border-transparent text-slate-500'"
           class="px-4 py-2 border-b-2 -mb-px text-sm hover:text-slate-800">외국인</a>
        <a th:href="@{/workers(type='KOREAN', q=${q})}"
           th:classappend="${type != null and type.name() == 'KOREAN'} ? 'border-slate-800 text-slate-800 font-medium' : 'border-transparent text-slate-500'"
           class="px-4 py-2 border-b-2 -mb-px text-sm hover:text-slate-800">한국인</a>
    </div>

    <!-- 검색 -->
    <form th:action="@{/workers}" method="get" class="mt-4 flex gap-2">
        <input type="hidden" name="type" th:if="${type != null}" th:value="${type.name()}">
        <input type="text" name="q" th:value="${q}" placeholder="이름 또는 연락처 검색"
               class="w-64 rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
        <button type="submit" class="rounded-md bg-slate-200 text-slate-700 text-sm px-4 py-2 hover:bg-slate-300">검색</button>
    </form>

    <!-- 목록 테이블 -->
    <div class="mt-4 overflow-x-auto bg-white rounded-lg border border-slate-200">
        <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 text-left">
            <tr>
                <th class="px-3 py-2 font-medium">유형</th>
                <th class="px-3 py-2 font-medium">한국명</th>
                <th class="px-3 py-2 font-medium">외국명</th>
                <th class="px-3 py-2 font-medium">생년월일</th>
                <th class="px-3 py-2 font-medium">연락처</th>
                <th class="px-3 py-2 font-medium">비자만료</th>
                <th class="px-3 py-2 font-medium">교육만료</th>
                <th class="px-3 py-2 font-medium">고정</th>
                <th class="px-3 py-2 font-medium text-right">관리</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="w : ${workers}" class="hover:bg-slate-50">
                <td class="px-3 py-2">
                    <span th:if="${w.workerType.name() == 'FOREIGN'}"
                          class="text-xs px-2 py-0.5 rounded bg-blue-50 text-blue-600">외국인</span>
                    <span th:if="${w.workerType.name() == 'KOREAN'}"
                          class="text-xs px-2 py-0.5 rounded bg-green-50 text-green-600">한국인</span>
                </td>
                <td class="px-3 py-2 font-medium text-slate-800" th:text="${w.nameKo}">이름</td>
                <td class="px-3 py-2 text-slate-500" th:text="${w.nameForeign} ?: '-'">-</td>
                <td class="px-3 py-2 text-slate-600" th:text="${w.birthDate}">1988-01-27</td>
                <td class="px-3 py-2 text-slate-600" th:text="${w.phone}">01000000000</td>
                <td class="px-3 py-2 text-slate-600"
                    th:text="${w.visaTracked} ? ${w.visaExpireDate} : '-'">-</td>
                <td class="px-3 py-2 text-slate-600"
                    th:text="${w.eduExpireDate != null} ? ${w.eduExpireDate} : '미등록'">미등록</td>
                <td class="px-3 py-2">
                    <span th:if="${w.fixed}" class="text-xs px-2 py-0.5 rounded bg-amber-50 text-amber-600">고정</span>
                </td>
                <td class="px-3 py-2 text-right">
                    <a th:href="@{/workers/{id}(id=${w.id})}" class="text-slate-600 hover:text-slate-900 underline">상세</a>
                </td>
            </tr>
            <tr th:if="${workers.isEmpty()}">
                <td colspan="9" class="px-3 py-10 text-center text-slate-400">등록된 근로자가 없습니다</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <div class="mt-4 flex items-center justify-between text-sm text-slate-500" th:if="${page.totalElements > 0}">
        <span>총 <span th:text="${page.totalElements}">0</span>명</span>
        <div class="flex items-center gap-2">
            <a th:if="${!page.first}"
               th:href="@{/workers(type=${type != null ? type.name() : null}, q=${q}, page=${page.number - 1})}"
               class="px-3 py-1.5 rounded-md bg-slate-200 hover:bg-slate-300">이전</a>
            <span th:text="${page.number + 1} + ' / ' + ${page.totalPages}">1 / 1</span>
            <a th:if="${!page.last}"
               th:href="@{/workers(type=${type != null ? type.name() : null}, q=${q}, page=${page.number + 1})}"
               class="px-3 py-1.5 rounded-md bg-slate-200 hover:bg-slate-300">다음</a>
        </div>
    </div>
</main>
</body>
</html>
