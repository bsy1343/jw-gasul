<!-- workers/form.html — 근로자 등록 폼(F-02). 유형 선택 시 외국인 전용 필드 동적 표시(worker-form.js) -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('근로자 등록 · 재원가설 인원관리')}"></head>
<body class="min-h-screen bg-slate-100">
<nav th:replace="~{fragments/layout :: nav('workers')}"></nav>

<main class="max-w-2xl mx-auto px-3 sm:px-4 py-5 sm:py-8">
    <div class="flex items-center gap-2 text-sm text-slate-500">
        <a th:href="@{/workers}" class="hover:text-slate-800">근로자</a>
        <span>/</span>
        <span class="text-slate-800">등록</span>
    </div>
    <h1 class="mt-2 text-2xl font-semibold text-slate-800">근로자 등록</h1>

    <form th:action="@{/workers}" th:object="${workerForm}" method="post"
          id="worker-form" class="mt-6 space-y-5 bg-white rounded-xl border border-slate-200 p-6">

        <!-- 전역 오류(중복 등) — th:object 컨텍스트 안에서 평가되어야 한다 -->
        <div th:if="${#fields.hasGlobalErrors()}" class="rounded-md bg-red-50 text-red-700 text-sm px-4 py-2">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">오류</p>
        </div>

        <!-- 유형 선택 -->
        <div>
            <span class="block text-sm font-medium text-slate-700 mb-1">유형 <span class="text-red-500">*</span></span>
            <div class="flex gap-4" id="worker-type-group">
                <label class="flex items-center gap-2 text-sm">
                    <input type="radio" th:field="*{workerType}" value="FOREIGN"> 외국인
                </label>
                <label class="flex items-center gap-2 text-sm">
                    <input type="radio" th:field="*{workerType}" value="KOREAN"> 한국인
                </label>
            </div>
            <p th:if="${#fields.hasErrors('workerType')}" th:errors="*{workerType}" class="mt-1 text-xs text-red-500"></p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- 한국 이름 -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="nameKo">한국 이름 <span class="text-red-500">*</span></label>
                <input type="text" id="nameKo" th:field="*{nameKo}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
                <p th:if="${#fields.hasErrors('nameKo')}" th:errors="*{nameKo}" class="mt-1 text-xs text-red-500"></p>
            </div>
            <!-- 외국 이름(외국인 전용) -->
            <div data-foreign-only>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="nameForeign">외국 이름</label>
                <input type="text" id="nameForeign" th:field="*{nameForeign}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- 생년월일 -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="birthDate">생년월일 <span class="text-red-500">*</span></label>
                <input type="text" id="birthDate" th:field="*{birthDate}" data-date-input
                       inputmode="numeric" placeholder="예: 1990-01-15" maxlength="10" autocomplete="off"
                       pattern="\d{4}-\d{2}-\d{2}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
                <p class="mt-1 text-xs text-slate-400">숫자만 입력하면 자동으로 <span class="font-mono">YYYY-MM-DD</span> 형식이 됩니다.</p>
                <p th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}" class="mt-1 text-xs text-red-500"></p>
            </div>
            <!-- 휴대폰 -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="phone">휴대폰 <span class="text-red-500">*</span></label>
                <input type="text" id="phone" th:field="*{phone}" data-phone-input inputmode="tel"
                       placeholder="010-0000-0000"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
                <p th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="mt-1 text-xs text-red-500"></p>
            </div>
        </div>

        <!-- 외국인 전용: 국적/비자 -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" data-foreign-only>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="nationality">국적</label>
                <input type="text" id="nationality" th:field="*{nationality}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="visaGrade">비자등급</label>
                <input type="text" id="visaGrade" th:field="*{visaGrade}" list="visa-grades"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
                <datalist id="visa-grades">
                    <option value="E-9"></option><option value="H-2"></option><option value="F-4"></option>
                    <option value="F-5"></option><option value="F-6"></option><option value="D-2"></option>
                </datalist>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="visaExpireDate">비자 만료일</label>
                <input type="date" id="visaExpireDate" th:field="*{visaExpireDate}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
                <p class="mt-1 text-xs text-slate-400">미입력 시 만료 관리 제외</p>
            </div>
        </div>

        <!-- 교육 이수일(만료일 자동 계산) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1" for="eduCompleteDate">교육 이수일</label>
                <input type="date" id="eduCompleteDate" th:field="*{eduCompleteDate}"
                       class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
                <p class="mt-1 text-xs text-slate-400">만료일은 이수일 + 유효기간으로 자동 계산됩니다</p>
            </div>
            <div class="flex items-end">
                <label class="flex items-center gap-2 text-sm text-slate-700">
                    <input type="checkbox" th:field="*{fixed}"> 고정 인원
                </label>
            </div>
        </div>

        <!-- 비고 -->
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1" for="memo">비고</label>
            <textarea id="memo" th:field="*{memo}" rows="2"
                      class="w-full rounded-md border border-slate-300 px-3 py-2.5 text-base sm:text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"></textarea>
        </div>

        <div class="flex items-center justify-end gap-2 pt-2">
            <a th:href="@{/workers}" class="rounded-md bg-slate-100 text-slate-600 text-sm px-4 py-2 hover:bg-slate-200">취소</a>
            <button type="submit" class="rounded-md bg-slate-800 text-white text-sm font-medium px-5 py-2 hover:bg-slate-700">저장</button>
        </div>
    </form>
    <p class="mt-3 text-xs text-slate-400">사진·계좌는 등록 후 상세 화면에서 추가합니다.</p>
</main>

<script th:src="@{/js/worker-form.js}"></script>
</body>
</html>
