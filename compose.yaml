# compose.yaml — 로컬 개발용 PostgreSQL. 운영은 홈서버 기존 PostgreSQL 인스턴스를 사용한다.
# 사용: docker compose up -d  (스키마 jwgasul는 Flyway가 create-schemas로 생성)
services:
  postgres:
    image: postgres:17-alpine
    container_name: jw-gasul-postgres
    environment:
      POSTGRES_DB: jwgasul
      POSTGRES_USER: jwgasul
      POSTGRES_PASSWORD: jwgasul
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - jw-gasul-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jwgasul -d jwgasul"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  jw-gasul-pgdata:
